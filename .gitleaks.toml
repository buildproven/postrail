# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "Gitleaks Configuration"

[extend]
# Use default gitleaks rules
useDefault = true

[allowlist]
description = "Allowlist for false positives"

# Ignore test files, build artifacts, and documentation
paths = [
  '''.*\.test\.(ts|tsx|js|jsx)$''',
  '''.*\.spec\.(ts|tsx|js|jsx)$''',
  '''^tests/.*''',
  '''^docs/.*''',
  '''^\.github/.*''',
  '''.*\.example$''',
  '''.*\.md$''',
  '''^coverage/.*''',
  '''package-lock\.json$''',
  # Build artifacts (minified code contains JWT patterns)
  '''^\.next/.*''',
  '''^node_modules/.*''',
  '''^dist/.*''',
  '''^build/.*''',
  # Local environment files (never committed, but gitleaks scans working dir)
  '''\.env\.local$''',
  '''\.env\.production\.local$''',
  '''\.env\.development\.local$''',
  '''^\.vercel/.*''',
  # CI scripts with test keys
  '''^scripts/ci-local\.sh$''',
]

# Ignore common false positives
regexes = [
  # React key props
  '''key=\{.*\}''',
  # Package version patterns
  '''"[^"]+": "\^[0-9]+\.[0-9]+\.[0-9]+"''',
  # Null/empty values
  ''':\s*null''',
  ''':\s*""''',
  # Example/placeholder patterns
  '''your-api-key-here''',
  '''example\.com''',
  '''fake-token''',
  '''test-secret''',
]

# Ignore specific strings that are definitely not secrets
stopwords = [
  "example",
  "test",
  "fake",
  "mock",
  "placeholder",
  "your-api-key",
  "TODO",
]
